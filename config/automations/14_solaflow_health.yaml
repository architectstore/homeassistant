# =============================================================================
# Battery health management (tunable)
#
# - Upper SoC exercise:
#   Normally cap charge at CAP_NORMAL, but allow CAP_FULL once every
#   FULL_INTERVAL_DAYS calendar days when SoC reaches "full" (>= FULL_SOC_PCT).
#
# - Lower SoC exercise:
#   Normally keep discharge floor at DISCHARGE_MIN_NORMAL, but allow deeper
#   discharge down to DISCHARGE_MIN_DEEP if that low SoC hasn't been reached for
#   DISCHARGE_INTERVAL_DAYS calendar days.
#
# =====================================================================

- id: battery_health_management
  alias: "Battery health management"
  mode: single

  variables:
    # --- TUNABLE SETTINGS ---
    SOC_SENSOR: sensor.zendure_battery_soc

    # Helpers
    LAST_FULL_DATE_HELPER: input_text.zendure_last_full_date
    LAST_DEEP_DISCHARGE_DATE_HELPER: input_text.zendure_last_deep_discharge_date

    CHARGE_CAP_HELPER: input_number.solarflow_soc_charge_max
    DISCHARGE_MIN_HELPER: input_number.solarflow_soc_discharge_min

    # --- CHARGE “FULL” EXERCISE ---
    FULL_SOC_PCT: 99
    FULL_HOLD_TIME: "00:20:00"
    FULL_INTERVAL_DAYS: 15
    CAP_NORMAL: 90
    CAP_FULL: 100

    # --- DISCHARGE “DEEP” EXERCISE ---
    DEEP_SOC_PCT: 5
    DEEP_HOLD_TIME: "00:10:00"
    DISCHARGE_INTERVAL_DAYS: 20
    DISCHARGE_MIN_NORMAL: 20
    DISCHARGE_MIN_DEEP: 5

    # Recalc schedule
    DAILY_RECALC_AT: "00:05:00"

    # --- TRIGGER THRESHOLDS (must be static numbers for reliability) ---
    # Emulate ">= 99" with strict "above"
    FULL_TRIGGER_ABOVE_STATIC: 98.9
    # Emulate "<= 5" with strict "below"
    DEEP_TRIGGER_BELOW_STATIC: 5.1

  trigger:
    - platform: numeric_state
      entity_id: sensor.zendure_battery_soc
      above: 98.9
      for: "00:20:00"
      id: reached_full

    - platform: numeric_state
      entity_id: sensor.zendure_battery_soc
      below: 5.1
      for: "00:10:00"
      id: reached_deep

    - platform: time
      at: "00:05:00"
      id: daily_recalc

    - platform: homeassistant
      event: start
      id: ha_start

  variables:
    today_date: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"

    # ----- CHARGE side state -----
    last_full_date_str: "{{ states(LAST_FULL_DATE_HELPER) }}"
    last_full_date: >-
      {% if last_full_date_str is match('^\\d{4}-\\d{2}-\\d{2}$') %}
        {{ as_datetime(last_full_date_str ~ ' 00:00:00') }}
      {% else %}
        {{ none }}
      {% endif %}
    days_since_full: >-
      {% if last_full_date is not none %}
        {{ (today_date.date() - last_full_date.date()).days }}
      {% else %}
        9999
      {% endif %}
    allow_full: "{{ days_since_full >= (FULL_INTERVAL_DAYS | int) }}"
    target_charge_cap: "{{ CAP_FULL if allow_full else CAP_NORMAL }}"

    # ----- DISCHARGE side state -----
    last_deep_date_str: "{{ states(LAST_DEEP_DISCHARGE_DATE_HELPER) }}"
    last_deep_date: >-
      {% if last_deep_date_str is match('^\\d{4}-\\d{2}-\\d{2}$') %}
        {{ as_datetime(last_deep_date_str ~ ' 00:00:00') }}
      {% else %}
        {{ none }}
      {% endif %}
    days_since_deep: >-
      {% if last_deep_date is not none %}
        {{ (today_date.date() - last_deep_date.date()).days }}
      {% else %}
        9999
      {% endif %}
    allow_deep: "{{ days_since_deep >= (DISCHARGE_INTERVAL_DAYS | int) }}"
    target_discharge_min: "{{ DISCHARGE_MIN_DEEP if allow_deep else DISCHARGE_MIN_NORMAL }}"

  action:
    - choose:
        - conditions: "{{ trigger.id == 'reached_full' }}"
          sequence:
            - service: input_text.set_value
              target:
                entity_id: "{{ LAST_FULL_DATE_HELPER }}"
              data:
                value: "{{ now().strftime('%Y-%m-%d') }}"

        - conditions: "{{ trigger.id == 'reached_deep' }}"
          sequence:
            - service: input_text.set_value
              target:
                entity_id: "{{ LAST_DEEP_DISCHARGE_DATE_HELPER }}"
              data:
                value: "{{ now().strftime('%Y-%m-%d') }}"

    - service: input_number.set_value
      target:
        entity_id: "{{ CHARGE_CAP_HELPER }}"
      data:
        value: "{{ target_charge_cap }}"

    - service: input_number.set_value
      target:
        entity_id: "{{ DISCHARGE_MIN_HELPER }}"
      data:
        value: "{{ target_discharge_min }}"
